<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Mochi PC端串口控制中心</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#121214;color:#fff;font-family:-apple-system,Arial,sans-serif;padding:20px; padding-bottom:60px;}
        .box{background:#1c1c1f;border-radius:16px;max-width:500px;margin:0 auto; padding-bottom: 20px; position: relative; overflow: hidden;}
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .tabs{display:flex;background:#222;border-bottom:1px solid #333;}
        .tab-btn{flex:1;padding:14px 4px;text-align:center;cursor:pointer;color:#888;font-size:14px;border:none;background:none;transition:0.2s}
        .tab-btn.active{color:#e67e22;border-bottom:2px solid #e67e22;background:#2a2a2f}
        .tab-content{padding:20px;display:none;animation:fadeIn 0.3s ease}
        .tab-content.active{display:block}
        @keyframes fadeIn { from {opacity:0; transform:translateY(5px)} to {opacity:1; transform:translateY(0)} }
        .btn{background:#e67e22;color:#fff;border:none;padding:12px;border-radius:10px;width:100%;margin-top:8px;font-weight:bold;cursor:pointer;transition:0.2s}
        .btn:hover{opacity:0.9} .btn:disabled{background:#555;cursor:not-allowed;}
        .btn.small{padding:8px;font-size:12px;width:auto;}
        .btn.danger{background:#e74c3c} .btn.success{background:#2ecc71} .btn.warning{background:#f39c12}
        .mode-group{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
        .mode-btn{flex:1;padding:18px;background:#2a2a2f;border:2px solid #444;border-radius:12px;cursor:pointer;transition:0.2s; font-size:16px; font-weight:bold;}
        .mode-btn#mode0.active{background:linear-gradient(135deg,#e67e22,#d35400);color:#fff;border-color:#e67e22}
        .mode-btn#mode1.active{background:linear-gradient(135deg,#3498db,#2980b9);color:#fff;border-color:#3498db}
        .mode-btn#mode2.active{background:linear-gradient(135deg,#f1c40f,#f39c12);color:#fff;border-color:#f1c40f}
        .card { background:#2a2a2f; padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #333; }
        .toggle-switch{display:flex;align-items:center;justify-content:space-between;margin:10px 0}
        .toggle-switch input{width:48px;height:24px;-webkit-appearance:none;background:#555;border-radius:12px;position:relative;cursor:pointer;outline:none}
        .toggle-switch input:checked{background:#e67e22}
        .toggle-switch input:before{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:0.2s}
        .toggle-switch input:checked:before{left:26px}
        
        .slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
        .slot-card{background:#2a2a2f;border-radius:12px;padding:12px;text-align:center;display:flex;flex-direction:column; border:2px solid transparent;}
        .slot-card.has-image{background:#222d28}
        .thumb-canvas{position:relative;width:100%;max-width:140px;aspect-ratio:1/1;margin:0 auto 10px;border-radius:8px;background:#111;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#555;cursor:pointer;}
        .slot-actions{display:flex;flex-direction:column;margin-top:auto}
        .slot-actions button{padding:10px;font-size:13px;border:none;border-radius:8px;cursor:pointer;width:100%;font-weight:bold;transition:0.2s;color:#fff;}
        .slot-actions button:active{transform:scale(0.95)}
        .delete-x {
            position: absolute; top: -8px; right: -8px; background: #e74c3c; color: #fff; border: 2px solid #1c1c1f; border-radius: 50%;
            width: 24px; height: 24px; font-size: 14px; line-height: 20px; text-align: center; cursor: pointer; z-index: 10; padding: 0; font-weight: bold; transition: 0.2s;
        }
        .delete-x:hover { transform: scale(1.1); }
        .delete-x:active { transform: scale(0.85); }
        
        .sync-badge { position: absolute; top: -8px; left: -8px; background: #3498db; color: #fff; font-size: 10px; padding: 4px 8px; border-radius: 12px; animation: pulse 1.5s infinite; border: 2px solid #1c1c1f;}
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .p-bar{width:100%;background:#111;height:10px;border-radius:5px;overflow:hidden;border:1px solid #333; margin: 10px 0;}
        #fill{width:0;height:100%;background:linear-gradient(90deg,#e67e22,#f1c40f);transition:width 0.1s}
        input[type=range] { width: 100%; cursor: pointer; accent-color: #e67e22; }
        textarea.note-input { width:100%; background:#111; color:#fff; border:1px solid #444; padding:10px; border-radius:8px; resize:none; margin-bottom:10px; font-family: inherit;}
        .note-item { background:#222; padding:15px; border-radius:8px; margin-bottom:10px; border-left:4px solid #444; }
        .note-item.pinned { border-left-color:#e74c3c; background:#342626;}
        #logArea { margin-top:20px; background:#000; padding:10px; border-radius:8px; font-family:monospace; font-size:12px; height:150px; overflow-y:auto; color:#0f0;}
        .connect-overlay { position: absolute; top:0; left:0; right:0; bottom:0; background:rgba(18,18,20,0.95); display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:100;}
    </style>
</head>
<body>

<div class="box">
    
    <div id="connectOverlay" class="connect-overlay">
        <h2>🔌 PC 串口管理台</h2>
        <p style="color:#888; margin: 15px 0; text-align:center;">请使用数据线连接设备<br>支持 Edge 或 Chrome 浏览器</p>
        <button class="btn" id="btnConnect" style="width: 200px; font-size: 16px; padding: 15px;">🔗 连 接 串 口</button>
    </div>

    <div class="header">
        <h3 style="color:#e67e22;">Mochi Desktop Console</h3>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="0">模式</button>
        <button class="tab-btn" data-tab="1">图库</button>
        <button class="tab-btn" data-tab="2">笔记</button>
        <button class="tab-btn" data-tab="3">设置</button>
    </div>
    
    <div class="tab-content active" id="tab0">
        <div class="mode-group">
            <div class="mode-btn" id="mode0" onclick="setMode(0)">🖼️ 图片模式</div>
            <div class="mode-btn" id="mode1" onclick="setMode(1)">⏰ 时钟模式</div>
            <div class="mode-btn" id="mode2" onclick="setMode(2)">📝 笔记模式</div>
        </div>
    </div>
    
    <div class="tab-content" id="tab1">
        <canvas id="compressCanvas" width="240" height="240" style="display:none"></canvas>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        
        <div class="card" style="margin-top:0;">
            <div class="toggle-switch">
                <span style="font-weight:bold; color:#e67e22;">🎬 启用图片自动轮播</span>
                <input type="checkbox" id="imgSlideshowToggle" onchange="updateImgConfig()">
            </div>
            <div style="margin-top:15px; display:flex; align-items:center;">
                <span style="font-size:13px; color:#aaa; width:80px;">间隔: <span id="imgIntervalVal">10</span>秒</span>
                <input type="range" id="imgInterval" min="3" max="300" oninput="document.getElementById('imgIntervalVal').innerText=this.value" onchange="updateImgConfig()">
            </div>
        </div>

        <div id="uploadProgressArea" class="card" style="display:none; border-color:#f39c12;">
            <div style="color:#f39c12; text-align:center; font-weight:bold;" id="uploadStatus">准备上传...</div>
            <div class="p-bar"><div id="fill"></div></div>
        </div>
        
        <div class="slot-grid" id="slotGrid"></div>
    </div>

    <div class="tab-content" id="tab2">
        <div class="card" style="margin-top:0;">
            <div class="toggle-switch">
                <span style="font-weight:bold; color:#f1c40f;">🔂 启用笔记自动轮播</span>
                <input type="checkbox" id="noteSlideshowToggle" onchange="updateNoteConfig()">
            </div>
            <div style="margin-top:15px; display:flex; align-items:center;">
                <span style="font-size:13px; color:#aaa; width:80px;">间隔: <span id="noteIntervalVal">10</span>秒</span>
                <input type="range" id="noteInterval" min="3" max="300" oninput="document.getElementById('noteIntervalVal').innerText=this.value" onchange="updateNoteConfig()">
            </div>
            <div style="font-size:11px; color:#888; margin-top:12px; line-height:1.4;">提示：若某条笔记被“置顶”，屏幕将强制显示该置顶笔记，轮播功能将暂时挂起。</div>
        </div>

        <div class="card">
            <textarea id="noteText" class="note-input" rows="3" placeholder="输入新笔记 (最多75字)..."></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span id="charCount" style="font-size:12px; color:#888;">0/75</span>
                <div style="display:flex; gap:10px;">
                    <button class="btn small" id="cancelNoteBtn" style="display:none; background:#555; margin-left:10px;" onclick="cancelEditNote()">取消编辑</button>
                    <button class="btn success small" onclick="saveNote()" style="margin:0; background:#f1c40f; color:#000;">➕ 添加新笔记</button>
                </div>
            </div>
        </div>
        
        <h4 style="font-size:15px; color:#ddd; margin-bottom:10px; padding-left:4px;">历史笔记</h4>
        <div id="noteList"></div>
    </div>
    
    <div class="tab-content" id="tab3">
        <div class="card">
            <div style="display:flex;justify-content:space-between;font-weight:bold;margin-bottom:8px;">
                <span>📊 内部存储空间</span><span id="sysSpaceText" style="color:#aaa;">检查中...</span>
            </div>
            <div class="p-bar" style="height:8px; margin:0;"><div id="sysSpaceBar" style="width:0%; background:#e67e22; height:100%; border-radius:4px; transition:width 0.3s;"></div></div>
        </div>

        <div class="card" id="otaCard" style="display:flex; justify-content:space-between; align-items:center;">
            <span id="versionLabel" style="font-weight:bold; color:#e67e22;">固件版本: 获取中...</span>
            <button class="btn small" id="btnCheckUpdate" onclick="checkUpdate()" style="margin:0; background:#3498db;">检查更新</button>
        </div>
        <div id="updateInfo" class="card" style="display:none; background:#223; border-color:#2ecc71;"></div>

        <div class="card">
            <label style="display:block;margin-bottom:15px;font-size:15px;font-weight:bold;">💡 屏幕背光亮度</label>
            <input type="range" id="brightness" min="0" max="255" value="255" style="width:100%; cursor:pointer;">
            <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:#888;">
                <span>暗</span><span>亮</span>
            </div>
        </div>

        <div class="card" style="border-color:#e74c3c;">
            <h4 style="color:#e74c3c; margin-bottom:10px;">⚠️ 危险操作</h4>
            <button class="btn danger" onclick="formatFS()">🧹 深度格式化 (清空图片与笔记)</button>
        </div>
        
        <div class="card" style="border-color:#f39c12;">
            <h4 style="color:#f39c12; margin-bottom:10px;">⚡ 系统维护</h4>
            <button class="btn warning" onclick="resetSystem()">🔄 恢复出厂设置 (清除WiFi)</button>
        </div>
    </div>
    
    <div style="padding: 0 20px;">
        <div style="font-size: 12px; color: #888; margin-bottom: 5px;">通信终端日志:</div>
        <div id="logArea"></div>
    </div>
</div>

<script>
    let localImageCache = {0:null, 1:null, 2:null, 3:null}; 
    let currentESPVersion = "未知";
    let port;
    let globalWriter = null;

    document.getElementById('noteText').addEventListener('input', function() {
        if (this.value.length > 75) this.value = this.value.substring(0, 75);
        document.getElementById('charCount').innerText = this.value.length + '/75';
    });

    // 🌟 后台图片同步引擎：加入自动重传机制 🌟
    let syncEngine = {
        active: false, queue: [], currentSlot: -1, y: 0,
        canvas: document.createElement('canvas'), ctx: null, imgData: null,
        timeoutTimer: null, retries: 0,
        
        init: function() { this.canvas.width = 240; this.canvas.height = 240; this.ctx = this.canvas.getContext('2d'); },
        checkNeedSync: function(slots) {
            for(let i=0; i<4; i++) {
                if (slots[i] && !localImageCache[i] && !this.queue.includes(i) && this.currentSlot !== i) this.queue.push(i);
            }
            if(!this.active && this.queue.length > 0 && !uploadState.active) this.startNext();
        },
        startNext: function() {
            if(this.queue.length === 0 || uploadState.active) return;
            this.active = true; this.currentSlot = this.queue.shift(); this.y = 0; this.retries = 0;
            this.imgData = this.ctx.createImageData(240, 240);
            this.requestChunk(); sendCmd({cmd: "image_info"}); 
        },
        requestChunk: function() {
            if(uploadState.active) { setTimeout(() => this.requestChunk(), 2000); return; }
            if(this.y >= 240) {
                this.ctx.putImageData(this.imgData, 0, 0);
                localImageCache[this.currentSlot] = this.canvas.toDataURL('image/jpeg', 0.8);
                this.active = false; this.currentSlot = -1;
                clearTimeout(this.timeoutTimer);
                sendCmd({cmd: "image_info"}); 
                setTimeout(() => this.startNext(), 500);
                return;
            }
            // 每次仅拉取 1 行，最大限度保护串口缓冲区
            sendCmd({cmd: "get_image_chunk", slot: this.currentSlot, y: this.y, h: 1});
            
            // 强力容错：如果丢包，自动重试
            clearTimeout(this.timeoutTimer);
            this.timeoutTimer = setTimeout(() => {
                this.retries++;
                if(this.retries > 3) {
                    log(`❌ 槽位 ${this.currentSlot+1} 回显连续失败，已放弃`);
                    this.active = false; this.currentSlot = -1;
                    sendCmd({cmd: "image_info"});
                    setTimeout(() => this.startNext(), 1000);
                } else {
                    log(`⚠️ 回显断流，正在重发请求 (${this.retries}/3)...`);
                    this.requestChunk();
                }
            }, 1000);
        },
        handleChunkData: function(res) {
            if(res.status !== 'ok' || this.currentSlot !== res.slot) return;
            clearTimeout(this.timeoutTimer);
            this.retries = 0;
            
            let data = this.imgData.data; let hex = res.data; let pIdx = 0;
            for (let row = 0; row < res.h; row++) {
                for (let x = 0; x < 240; x++) {
                    let pStr = hex.substr(pIdx, 4);
                    if(pStr.length === 4) {
                        let p = parseInt(pStr, 16); pIdx += 4;
                        let idx = ((res.y + row) * 240 + x) * 4;
                        data[idx] = ((p >> 11) & 0x1F) * 8; data[idx+1] = ((p >> 5) & 0x3F) * 4; data[idx+2] = (p & 0x1F) * 8; data[idx+3] = 255;
                    }
                }
            }
            this.y += res.h;
            let pText = document.getElementById(`sync-progress-${this.currentSlot}`);
            if(pText) pText.innerText = `拉取 ${Math.round(this.y/240*100)}%`;
            setTimeout(() => this.requestChunk(), 40);
        }
    };
    syncEngine.init();

    // --- UI 控制 ---
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab' + btn.dataset.tab).classList.add('active');
            refreshCurrentTab(btn.dataset.tab);
        });
    });

    function log(msg) {
        const el = document.getElementById('logArea');
        el.innerHTML += `<div>> ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    document.getElementById('btnConnect').addEventListener('click', async () => {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            globalWriter = port.writable.getWriter(); 
            document.getElementById('connectOverlay').style.display = 'none';
            log("✅ 串口连接成功");
            startReading();
            refreshCurrentTab("0");
        } catch (e) { alert("连接失败: " + e); }
    });

    async function sendCmd(jsonObj) {
        if (!globalWriter) return;
        const msg = JSON.stringify(jsonObj) + "\n";
        try { await globalWriter.write(new TextEncoder().encode(msg)); } 
        catch (e) { log("❌ 发送数据失败: " + e.message); }
    }

    async function startReading() {
        const decoder = new TextDecoderStream();
        port.readable.pipeTo(decoder.writable);
        const reader = decoder.readable.getReader();
        let buffer = "";
        try {
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += value;
                let lines = buffer.split('\n');
                buffer = lines.pop(); 
                for (let line of lines) {
                    line = line.trim();
                    if (line) {
                        if (line.startsWith('{')) { handleResponse(line); } 
                        else { log(`<span style="color:#e74c3c">[设备日志]: ${line}</span>`); }
                    }
                }
            }
        } catch (e) { log("读取断开: " + e); }
    }

    let uploadState = { active: false, imgData: null, y: 0, slot: 0, timeout: null, retries: 0 };
    let noteCache = [];
    let editingNoteIdx = -1;

    function handleResponse(jsonStr) {
        try {
            const res = JSON.parse(jsonStr);
            if(res.status !== "ok" || res.cmd === "error") { 
                log(`❌ 单片机异常: ${res.msg || '未知错误'}`); 
                if(uploadState.active && (res.cmd === "upload_chunk" || res.cmd === "upload_start")) {
                    document.getElementById('uploadStatus').innerText = `❌ 传输被单片机拒绝 (${res.msg || '未知错误'})`;
                    uploadState.active = false;
                    clearTimeout(uploadState.timeout);
                    document.getElementById('fileInput').value = ''; 
                }
                return; 
            }

            switch(res.cmd) {
                case "get_mode":
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    if(document.getElementById('mode' + res.mode)) document.getElementById('mode' + res.mode).classList.add('active');
                    break;
                case "fs_space":
                    document.getElementById('sysSpaceText').innerText = `${res.used} KB / ${res.total} KB`;
                    document.getElementById('sysSpaceBar').style.width = (res.used/res.total*100) + '%';
                    break;
                case "image_info":
                    document.getElementById('imgSlideshowToggle').checked = res.slideshow;
                    document.getElementById('imgInterval').value = res.interval;
                    document.getElementById('imgIntervalVal').innerText = res.interval;
                    renderSlots(res.slots, res.current);
                    syncEngine.checkNeedSync(res.slots);
                    break;
                case "image_chunk":
                    syncEngine.handleChunkData(res);
                    break;
                case "get_notes":
                    document.getElementById('noteSlideshowToggle').checked = res.noteSlideshow;
                    document.getElementById('noteInterval').value = res.noteInterval;
                    document.getElementById('noteIntervalVal').innerText = res.noteInterval;
                    noteCache = res.notes || [];
                    renderNotes(res.pinned);
                    break;
                case "ota_info":
                    currentESPVersion = res.current;
                    document.getElementById('versionLabel').innerText = "版本: V" + res.current;
                    break;
                case "upload_start":
                    clearTimeout(uploadState.timeout); 
                    uploadState.retries = 0;
                    processUploadChunk(); 
                    break;
                case "upload_chunk":
                    clearTimeout(uploadState.timeout);
                    uploadState.retries = 0;
                    let pct = Math.round((uploadState.y / 240) * 100);
                    document.getElementById('fill').style.width = pct + '%';
                    document.getElementById('uploadStatus').innerText = `正在写入单片机 ${pct}%`;
                    processUploadChunk(); 
                    break;
                case "upload_finish":
                    document.getElementById('uploadProgressArea').style.display = 'none';
                    document.getElementById('fileInput').value = '';
                    uploadState.active = false;
                    log("🎉 图片上传完全结束");
                    sendCmd({cmd: "image_info"}); 
                    break;
                case "delete_image":
                case "set_current_image":
                    sendCmd({cmd: "image_info"});
                    break;
                case "save_note":
                case "delete_note":
                case "set_note_config":
                    cancelEditNote();
                    sendCmd({cmd: "get_notes"});
                    break;
            }
        } catch(e) {}
    }

    function refreshCurrentTab(tab) {
        if(tab == "0") sendCmd({cmd: "get_mode"});
        if(tab == "1") sendCmd({cmd: "image_info"});
        if(tab == "2") sendCmd({cmd: "get_notes"});
        if(tab == "3") { sendCmd({cmd: "fs_space"}); sendCmd({cmd: "ota_info"}); }
    }

    function setMode(m) { 
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mode' + m).classList.add('active');
        sendCmd({cmd: "set_mode", mode: m}); 
    }
    
    function renderSlots(slots, currentIdx) {
        let html = '';
        for(let i=0; i<4; i++) {
            let hasImg = slots[i];
            let isCur = (i === currentIdx && hasImg);
            let isSyncing = (syncEngine.currentSlot === i);
            
            let previewHtml = `<span style="font-size:30px;">🈳</span>`;
            if (hasImg) {
                if (localImageCache[i]) {
                    previewHtml = `<img src="${localImageCache[i]}" style="width:100%;height:100%;border-radius:8px;object-fit:cover;">`;
                } else {
                    // 改为了统一的“等待拉取”提示
                    previewHtml = `<div style="font-size:24px;">🖼️</div><div id="sync-progress-${i}" style="font-size:11px;margin-top:8px;color:#3498db;font-weight:bold;">${isSyncing ? '后台拉取中...' : '等待拉取'}</div>`;
                }
            } else { localImageCache[i] = null; }

            html += `<div class="slot-card ${hasImg ? 'has-image' : ''}" id="slot-card-${i}" style="${isCur ? 'border-color:#e67e22;' : ''}">
                ${isSyncing ? `<div class="sync-badge">拉取中</div>` : ''}
                <div style="font-weight:bold; font-size:14px; margin-bottom:10px; color:#eee;">槽位 ${i+1} ${isCur?'⭐ (当前)':''}</div>
                
                <div id="thumb-container-${i}" class="thumb-canvas" style="background:${hasImg?'#000':'#111'}" onclick="clickSlotAction(${i}, ${hasImg})">
                    <button id="btn-del-${i}" class="delete-x" style="display:${hasImg ? 'block' : 'none'};" onclick="event.stopPropagation(); if(confirm('确定删除此图片？')) { localImageCache[${i}]=null; sendCmd({cmd:'delete_image', slot:${i}}); }">×</button>
                    ${previewHtml}
                </div>
                
                <div class="slot-actions">
                    <button id="btn-upload-${i}" onclick="triggerUpload(${i})" style="background:${hasImg ? '#e67e22' : '#3498db'}">${hasImg ? '🔄 替换图片' : '📁 选择图片'}</button>
                </div>
            </div>`;
        }
        document.getElementById('slotGrid').innerHTML = html;
    }

    window.clickSlotAction = function(i, hasImg) {
        if(uploadState.active){ alert('当前有任务正在上传中，请稍候'); return; }
        if (hasImg) { 
            sendCmd({cmd:'set_current_image', slot:i});
            log(`已发送推送指令: 槽位 ${i+1}`);
        } else { 
            triggerUpload(i); 
        }
    };

    function triggerUpload(slot) {
        if(uploadState.active) return alert("当前有任务正在上传中！");
        uploadState.slot = slot;
        document.getElementById('fileInput').click();
    }

    function updateImgConfig() {
        sendCmd({ cmd: "set_img_slideshow", enabled: document.getElementById('imgSlideshowToggle').checked, interval: parseInt(document.getElementById('imgInterval').value) });
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                const ctx = document.getElementById('compressCanvas').getContext('2d');
                const s = Math.min(img.width, img.height);
                ctx.drawImage(img, (img.width-s)/2, (img.height-s)/2, s, s, 0, 0, 240, 240);
                localImageCache[uploadState.slot] = document.getElementById('compressCanvas').toDataURL('image/jpeg', 0.8);
                uploadState.imgData = ctx.getImageData(0,0,240,240).data;
                uploadState.y = 0;
                uploadState.active = true;
                
                document.getElementById('uploadProgressArea').style.display = 'block';
                document.getElementById('fill').style.width = '0%';
                document.getElementById('uploadStatus').innerText = '正通知单片机清理旧数据...';
                
                setTimeout(() => { sendCmd({cmd: "upload_start", slot: uploadState.slot}); }, 500);

                uploadState.timeout = setTimeout(() => {
                    if(uploadState.active && uploadState.y === 0) {
                        document.getElementById('uploadStatus').innerText = '❌ 握手失败，串口可能断开，请重试';
                        uploadState.active = false;
                        document.getElementById('fileInput').value = ''; 
                    }
                }, 3500);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    function processUploadChunk() {
        if(uploadState.y >= 240) {
            document.getElementById('uploadStatus').innerText = '数据发送完毕，校验组装中...';
            sendCmd({cmd: "upload_finish"});
            return;
        }
        
        let h = Math.min(1, 240 - uploadState.y); 
        let hex = '';
        let d = uploadState.imgData;
        for(let row=0; row<h; row++) {
            for(let x=0; x<240; x++) {
                let i = ((uploadState.y + row)*240 + x)*4;
                let c = ((d[i]&0xF8)<<8) | ((d[i+1]&0xFC)<<3) | (d[i+2]>>3);
                hex += c.toString(16).padStart(4,'0');
            }
        }
        sendCmd({cmd: "upload_chunk", y: uploadState.y, h: h, data: hex});
        uploadState.y += h;
        
        clearTimeout(uploadState.timeout);
        uploadState.timeout = setTimeout(() => {
            uploadState.retries++;
            if (uploadState.retries > 3) {
                document.getElementById('uploadStatus').innerText = '❌ 连续丢包，传输彻底失败';
                uploadState.active = false;
                document.getElementById('fileInput').value = '';
            } else {
                log(`⚠️ 写入超时，重传第 ${uploadState.y} 行数据 (${uploadState.retries}/3)...`);
                uploadState.y -= h; 
                processUploadChunk();
            }
        }, 1500);
    }

    function renderNotes(pinnedIdx) {
        let html = '';
        noteCache.forEach((note, idx) => {
            let isPinned = (idx === pinnedIdx);
            html += `<div class="note-item ${isPinned ? 'pinned' : ''}">
                <div style="font-size:14px; margin-bottom:8px; line-height:1.4;">${note.content}</div>
                <div style="font-size:11px; color:#888; display:flex; justify-content:space-between; align-items:center;">
                    <span>⏳ ${note.time}</span>
                    <div>
                        <button class="btn small" style="background:#444" onclick="editNote(${idx})">✏️</button>
                        <button class="btn small ${isPinned?'':'warning'}" onclick="sendCmd({cmd:'set_note_config', pinned:${isPinned ? -1 : idx}})">${isPinned ? '📌 取消置顶' : '📌 置顶'}</button>
                        <button class="btn small danger" onclick="if(confirm('删除此笔记？')) sendCmd({cmd:'delete_note', index:${idx}})">🗑️</button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('noteList').innerHTML = html || '<div style="color:#666;text-align:center;padding:20px;">暂无历史笔记</div>';
    }

    function saveNote() {
        const text = document.getElementById('noteText').value.trim();
        if(!text) return alert("笔记内容不能为空");
        if(text.length > 75) return alert("字数超限 (最多 75 个字)");
        let payload = {cmd: "save_note", content: text};
        if(editingNoteIdx >= 0) payload.index = editingNoteIdx;
        sendCmd(payload);
    }

    function editNote(idx) {
        editingNoteIdx = idx;
        document.getElementById('noteText').value = noteCache[idx].content;
        document.getElementById('cancelNoteBtn').style.display = 'inline-block';
        document.getElementById('charCount').innerText = noteCache[idx].content.length + '/75';
    }
    function cancelEditNote() {
        editingNoteIdx = -1;
        document.getElementById('noteText').value = '';
        document.getElementById('cancelNoteBtn').style.display = 'none';
        document.getElementById('charCount').innerText = '0/75';
    }
    function updateNoteConfig() { sendCmd({ cmd: "set_note_config", slideshow: document.getElementById('noteSlideshowToggle').checked, interval: parseInt(document.getElementById('noteInterval').value) }); }

    let brightTimer;
    function adjustBrightness(val) {
        clearTimeout(brightTimer);
        brightTimer = setTimeout(() => sendCmd({cmd: "bright", v: parseInt(val)}), 100);
    }

    function cmpVersions(a, b) {
        let pa = a.split('.'); let pb = b.split('.');
        for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
            let na = parseInt(pa[i] || 0, 10); let nb = parseInt(pb[i] || 0, 10);
            if (na > nb) return 1; if (nb > na) return -1;
        }
        return 0;
    }

    async function checkUpdate() {
        const btn = document.getElementById('btnCheckUpdate');
        btn.innerText = "联系网络..."; btn.disabled = true;
        try {
            const res = await fetch("https://raw.githubusercontent.com/JTKhalil/claudeRobot/refs/heads/main/version.txt?t=" + Date.now());
            const text = await res.text();
            let lines = text.split('\n'); let newVer = lines[0].trim();
            
            if(cmpVersions(newVer, currentESPVersion) > 0) {
                let releaseNotes = lines.slice(1).join('<br>');
                document.getElementById('updateInfo').innerHTML = `
                    <div style="color:#2ecc71; font-weight:bold; margin-bottom:10px;">✨ 发现新版本: V${newVer}</div>
                    <div style="font-size:12px; color:#bbb; margin-bottom:10px; line-height:1.5;">${releaseNotes}</div>
                    <div style="font-size:11px; color:#e74c3c; margin-bottom:10px;">⚠️ 提醒: ESP32 本身必须连接了可用 WiFi 才能下载升级包！</div>
                    <button class="btn success small" onclick="if(confirm('更新大概需要 1-2 分钟，请勿断开电源。确认继续？')) sendCmd({cmd: 'do_update'})">🚀 立即指令设备更新</button>
                `;
                document.getElementById('updateInfo').style.display = 'block';
                btn.style.display = 'none';
            } else { alert("太棒了，设备目前已经是最新版本！"); btn.innerText = "检查更新"; btn.disabled = false; }
        } catch(e) { alert("无法访问 Github 获取更新信息: " + e.message); btn.innerText = "检查更新"; btn.disabled = false; }
    }

    function formatFS() {
        if(confirm("⚠️ 高危操作：确定格式化吗？这会清空芯片中所有的图片和笔记数据，且不可逆转！")) {
            sendCmd({cmd: "format_fs"});
            setTimeout(() => { alert("已发送深度清理指令。"); refreshCurrentTab("3"); }, 500);
        }
    }

    function resetSystem() {
        if(confirm("⚠️ 恢复出厂将清除设备的 WiFi 账号密码配置，并且单片机会立即重启！PC 串口将会断开连接。确定吗？")) {
            sendCmd({cmd: "reset_system"});
        }
    }
</script>
